name: Auto Doc Translate

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch for the PR'
        required: false
        default: 'main'
        type: string
      full_translate:
        description: 'Full translation: translate ALL docs (excluding python-api,triton_api,triton_api_extension,libdevice)'
        required: false
        default: false
        type: boolean

concurrency:
  group: translation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    permissions:
      contents: write
      pull-requests: write
    env:
      TARGET_BRANCH: ${{ inputs.target_branch || 'main' }}
      GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ env.GH_TOKEN }}
          ref: ${{ env.TARGET_BRANCH }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install openai sphinx myst-parser sphinx_rtd_theme

      - name: Detect .pot files to translate
        id: detect
        run: |
          # Check if locale/en/LC_MESSAGES/ has .po files
          po_count=$(find locale/en/LC_MESSAGES/ -name '*.po' 2>/dev/null | wc -l)

          if [ "${{ inputs.full_translate }}" = "true" ] || [ "$po_count" -eq 0 ]; then
            echo "Full translation mode"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "full_translate=true" >> $GITHUB_OUTPUT
          else
            # Incremental: detect changed .pot files via git diff on locale/zh/LC_MESSAGES/
            changed=$(git diff --name-only --diff-filter=ACMUX HEAD -- locale/zh/LC_MESSAGES/ 2>/dev/null || true)

            if [ -z "$changed" ]; then
              # No git changes — check if any .pot has no .po counterpart
              for pot in $(find locale/zh/LC_MESSAGES/ -name '*.pot' 2>/dev/null); do
                po="${pot/locale\/zh\//locale\/en\/}"
                po="${po%.pot}.po"
                if [ ! -f "$po" ]; then
                  changed="$changed $pot"
                fi
              done
            fi

            if [ -z "$changed" ]; then
              echo "No translation files changed"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "full_translate=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Translate via Sphinx gettext workflow
        if: steps.detect.outputs.has_changes == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ "${{ steps.detect.outputs.full_translate }}" = "true" ]; then
            python docs/scripts/translate_md.py \
              --first-time \
              --output-json /tmp/translation_results.json
          else
            python docs/scripts/translate_md.py \
              --all \
              --output-json /tmp/translation_results.json
          fi

      - name: Process translated .po files
        if: steps.detect.outputs.has_changes == 'true'
        id: results
        run: |
          if [ ! -f /tmp/translation_results.json ]; then
            echo "No translation results found"
            exit 1
          fi

          success_files=$(python3 -c "
          import json
          with open('/tmp/translation_results.json') as f:
              data = json.load(f)
          for p in data.get('success_files', []):
              print(p)
          ")

          if [ -z "$success_files" ]; then
            echo "No files were successfully translated"
            exit 1
          fi

          count=0
          file_list=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ -f "$file" ]; then
              count=$((count + 1))
              file_list="${file_list}- <code>${file}</code>"$'\n'
              git add "$file"
            fi
          done <<< "$success_files"

          [ $count -eq 0 ] && echo "No files to commit" && exit 1
          echo "Staged $count translated .po file(s)"
          {
            echo "file_count=$count"
            echo "file_list<<EOF"
            echo "$file_list"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create branch and commit
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git diff --cached --quiet && echo "Nothing to commit" && exit 1

          BRANCH_NAME="auto-pr/doc-translate-$(date +%Y%m%d%H%M%S)"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git checkout -b "${BRANCH_NAME}"

          count=$(git diff --cached --name-only | wc -l)
          git commit -s -m "[Doc] Auto-translate ${count} file(s) (Sphinx gettext)"
          git push origin "${BRANCH_NAME}"

      - name: Create Pull Request
        if: steps.detect.outputs.has_changes == 'true'
        env:
          FILE_LIST: ${{ steps.results.outputs.file_list }}
          FILE_COUNT: ${{ steps.results.outputs.file_count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_HEAD: ${{ github.repository_owner }}:${{ env.BRANCH_NAME }}
          PR_BASE: ${{ env.TARGET_BRANCH }}
        run: |
          if [ -z "${{ env.BRANCH_NAME }}" ]; then
            echo "Error: BRANCH_NAME not set"
            exit 1
          fi

          DATE=$(date +%Y-%m-%d)
          TITLE="[Doc] Auto-translate Chinese docs to English ${DATE}"

          BODY=$(cat <<-BODYEOF
          ## Auto-Translation Summary

          Translated **${FILE_COUNT}** gettext .po file(s):

          ${FILE_LIST}

          This PR uses the **Sphinx gettext i18n workflow**:
          - \`sphinx-build -b gettext\` extracts translatable strings from \`docs/zh/\`
          - \`.po\` files in \`locale/en/LC_MESSAGES/\` store translations
          - Read the Docs builds English docs using \`docs/en/conf.py\` with \`language=en\`

          ---

          [Workflow run](${RUN_URL})

          > This PR was automatically generated by the scheduled doc translation workflow.
          BODYEOF
          )

          gh pr create \
            --base "${PR_BASE}" \
            --head "${PR_HEAD}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --repo "${{ github.repository }}" \
            2>&1 || true
