name: Auto Doc Translate (zh → en) — PO-based

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch for the PR'
        required: false
        default: 'main'
        type: string

concurrency:
  group: translation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    permissions:
      contents: write
      pull-requests: write
    env:
      TARGET_BRANCH: ${{ inputs.target_branch || 'main' }}
      # Use a Personal Access Token (PAT) for push & PR creation.
      # The default GITHUB_TOKEN is restricted by GitHub for Actions-triggered PRs.
      # Steps to set up:
      #   1. Go to https://github.com/settings/tokens?type=beta and create a fine-grained PAT
      #      with "Contents: write" and "Pull requests: write" permissions on this repo.
      #   2. Add it as a secret named "PAT_TOKEN" in:
      #      Settings → Secrets and variables → Actions → Repository secrets
      GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ env.GH_TOKEN }}
          ref: ${{ env.TARGET_BRANCH }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install openai

      - name: Detect changed Chinese Markdown files
        id: detect
        run: |
          # Use git diff to find changed/new .md files in docs/zh/
          changed=$(git diff --name-only --diff-filter=ACMUX HEAD -- docs/zh/ || true)
          if [ -z "$changed" ]; then
            # No tracked changes — check if any zh file has no en counterpart
            for f in $(find docs/zh/ -name '*.md'); do
              en_path="${f/docs\/zh\//docs\/en\/}"
              if [ ! -f "$en_path" ]; then
                changed="$changed $f"
              fi
            done
          fi

          if [ -z "$changed" ]; then
            echo "No Chinese doc files changed since last commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            # Get unique .md files, strip the 'docs/zh/' prefix, and format as comma-separated list
            files=$(echo "$changed" | tr ' ' '\n' | sort -u | grep '\.md$' | sed 's|^docs/zh/||' | tr '\n' ',' | sed 's/,$//')
            echo "Changed files (relative to docs/zh/): $files"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "files=$files" >> $GITHUB_OUTPUT
          fi

      - name: Translate docs/zh/ to docs/en/ (PO-based)
        if: steps.detect.outputs.has_changes == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python docs/scripts/translate_md.py \
            --files "${{ steps.detect.outputs.files }}" \
            --output-json /tmp/translation_results.json

      - name: Process translated files (en + po)
        if: steps.detect.outputs.has_changes == 'true'
        id: results
        run: |
          if [ ! -f /tmp/translation_results.json ]; then
            echo "No translation results found"
            exit 1
          fi

          # Read the list of successfully translated .en files
          success_files=$(python3 -c "
          import json
          with open('/tmp/translation_results.json') as f:
              data = json.load(f)
          for p in data.get('success_files', []):
              print(p)
          ")

          if [ -z "$success_files" ]; then
            echo "No files were successfully translated"
            exit 1
          fi

          count=0
          file_list=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ -f "$file" ]; then
              count=$((count + 1))
              file_list="${file_list}- <code>${file}</code>"$'\n'
              git add "$file"
            fi

            # Also stage the corresponding .po file (if it exists)
            # Convert e.g. docs/en/quick_start.md -> docs/po/zh-to-en/quick_start.po
            po_file="${file/docs\/en\//docs/po/zh-to-en/}"
            po_file="${po_file%.md}.po"
            if [ -f "$po_file" ]; then
              git add "$po_file"
            fi
          done <<< "$success_files"

          [ $count -eq 0 ] && echo "No files to commit" && exit 1
          echo "Staged $count translated file(s) + corresponding .po files"
          {
            echo "file_count=$count"
            echo "file_list<<EOF"
            echo "$file_list"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create branch and commit
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git diff --cached --quiet && echo "Nothing to commit" && exit 1

          BRANCH_NAME="auto-pr/doc-translate-$(date +%Y%m%d%H%M%S)"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git checkout -b "${BRANCH_NAME}"

          count=$(git diff --cached --name-only | wc -l)
          git commit -s -m "[Doc] Auto-translate ${count} file(s) from zh to en (PO-based)"
          git push origin "${BRANCH_NAME}"

      - name: Create Pull Request
        if: steps.detect.outputs.has_changes == 'true'
        env:
          FILE_LIST: ${{ steps.results.outputs.file_list }}
          FILE_COUNT: ${{ steps.results.outputs.file_count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_HEAD: ${{ github.repository_owner }}:${{ env.BRANCH_NAME }}
          PR_BASE: ${{ env.TARGET_BRANCH }}
        run: |
          # Use gh CLI to create the PR — it respects the GH_TOKEN env var
          if [ -z "${{ env.BRANCH_NAME }}" ]; then
            echo "Error: BRANCH_NAME not set"
            exit 1
          fi

          DATE=$(date +%Y-%m-%d)
          TITLE="[Doc] Auto-translate Chinese docs to English ${DATE}"

          # Build body from heredoc to handle multi-line FILE_LIST
          BODY=$(cat <<-BODYEOF
          ## Auto-Translation Summary

          Translated **${FILE_COUNT}** file(s) from \`docs/zh/\` to \`docs/en/\`:

          ${FILE_LIST}

          This PR uses the **PO-based translation workflow**:
          - \`docs/po/zh-to-en/*.po\` files store block-level translations (msgid/msgstr pairs)
          - Only new/changed text blocks are re-translated — existing translations are preserved
          - Translation memory ensures consistency across runs

          ---

          [Workflow run](${RUN_URL})

          > This PR was automatically generated by the scheduled doc translation workflow.
          BODYEOF
          )

          gh pr create \
            --base "${PR_BASE}" \
            --head "${PR_HEAD}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --repo "${{ github.repository }}" \
            2>&1 || true
